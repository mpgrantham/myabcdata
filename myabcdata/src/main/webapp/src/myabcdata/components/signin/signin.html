<div style="padding: 10px; text-align: center;">

    
    <div ng-class="showForgotSection == 0 ? 'showElement' : 'hideElement'">	
    
    <p ng-class="{'normalMessage': status == 1, 'successMessage': status == 0, 'errorMessage': status == 2}">{{message}}</p>
    
    
	<table style="text-align: left;">
    	<tr>
    		<td>Username</td>
    		<td>
    			<input type="text" name="username" id="username" ng-model="user.username" ng-keyup="enableSignIn($event)" style="width: 150px;"/>
    		</td>
    	</tr>
    	<tr>
    		<td>Password</td>
    		<td> 
    			<input type="password" name="password" id="password" ng-model="user.password" ng-keyup="enableSignIn($event)" style="width: 150px;"/>
    		</td>
    	</tr>
    	   	
    	    	
    	<tr>
    		<td>&nbsp;</td>
    		<td>
    		<button ng-click="signIn()" ng-disabled="signInDisabled">Sign In</button>
    			 &nbsp;&nbsp;&nbsp;
	    		<button ng-click="cancelSignIn()">Cancel</button>
    		
    			
    		</td>
    	</tr>
    	
    	<tr>
    		<td>&nbsp;</td>
    		<td class="forgotSection"> 
    			<a href="#" ng-click="showForgetSection($event, 'Username')">Forgot Username?</a>
    		</td>
    	</tr>
    	
    	<tr>
    		<td>&nbsp;</td>
    		<td class="forgotSection"> 
    			<a href="#" ng-click="showForgetSection($event, 'Password')">Forgot Password?</a> 
    		</td>
    	</tr>
    	
    </table>
    </div>
    
    <div ng-class="showForgotSection == 1 ? 'showElement' : 'hideElement'">	
    
    	<p>{{forgotMessage}}</p>
    	
    	<table style="text-align: left;">
    	<tr>
    		<td>Email</td>
    		<td>
    			<input type="text" name="forgotEmail" id="forgotEmail" ng-model="forgotEmail" style="width: 300px;" ng-keyup="enableSend($event)"/>
    		</td>
    	</tr>
    	    	    	
    	<tr>
    		<td>&nbsp;</td>
    		<td>
    			 <button ng-disabled="sendDisabled" ng-click="sendForgot()">Send</button>
    			 &nbsp;&nbsp;&nbsp;
	    		<button ng-click="cancelForgot()">Cancel</button>
    		</td>
    	</tr>
    </table>
    </div>
    
</div>
