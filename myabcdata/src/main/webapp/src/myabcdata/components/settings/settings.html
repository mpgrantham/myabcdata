<div class="scrollContent">

	<uib-accordion close-others="true">
	
		<div uib-accordion-group class="panel-default" heading="User Settings" is-open="true" is-disabled="false">
	    	
	    	<div class="form-group">
		        <label for="username" class="control-label">Username</label>
		        <input class="form-control" type="text" id="username" ng-model="user.username" placeholder="Username"/>
		    </div>
		    
		     <div class="form-group">
		          <label for="password" class="control-label">Password</label>
		          <input class="form-control" type="password" id="password" ng-model="user.password" placeholder="Password" required/>
		     </div>
		     
		     <div class="form-group">
		          <label for="email" class="control-label">Email</label>
		          <input class="form-control" type="email" id="email" ng-model="user.email" placeholder="Email" required/>
		     </div>
		     
		     <div class="form-group">
				<label for="startPage">Start Page</label>
				<select class="form-control" id="startPage" ng-model="user.startPage">
			    	<option ng-repeat="option in startPages" value="{{option}}">{{option}}</option>
			    </select>
			  	
			</div> 
			
			<div>
		       	<button class="btn btn-primary" ng-click="update()">Update</button>
		    	<button class="btn"  style="margin-left: 10px;" ng-click="cancelUpdate()" ng-if="status > 0">Cancel</button>
			    <button class="btn"  style="margin-left: 10px;"ng-click="doneUpdate()" ng-if="status == 0">Done</button>
		     </div>
		     
	    </div>
	    
	    <div uib-accordion-group class="panel-default" heading="Observed Settings" is-open="false" is-disabled="false">
	    
	    	<observedsettings></observedsettings>
	    			
	    </div>  <!--  End Observed Accordion Group -->
		
	</uib-accordion>
	
	
	
	
    
    
    
</div>
